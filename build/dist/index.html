<!DOCTYPE html>
<html>
<head>
<title>Habit Tracker</title>
</head>
<body>

<h2>Habs</h2>

<input id="habitInput" placeholder="Enter habit">
<button onclick="addHabit()">Add Habit</button>

<h3>Habits</h3>
<ul id="habitList"></ul>

<script src="bundle.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  doc,
  setDoc,
  updateDoc,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";

export class Firebase {

  constructor(config){
    this.app = initializeApp(config);
    this.db = getFirestore(this.app);
  }

  /* ---------- Firestore ---------- */

  async add(collectionName, data){
    return await addDoc(collection(this.db, collectionName), data);
  }

  async getAll(collectionName){
    const snapshot = await getDocs(collection(this.db, collectionName));

    const result = [];
    snapshot.forEach(d=>{
      result.push({
        id: d.id,
        ...d.data()
      });
    });

    return result;
  }

  async set(collectionName, id, data){
    return await setDoc(doc(this.db, collectionName, id), data);
  }

  async update(collectionName, id, data){
    return await updateDoc(doc(this.db, collectionName, id), data);
  }

  async delete(collectionName, id){
    return await deleteDoc(doc(this.db, collectionName, id));
  }

}
</script>
<script type="module">
const firebaseConfig = {
  apiKey: "AIzaSyB0TxR5HpNJ8Ph7rnrHqXNMAmBWo1dw5Nw",
  authDomain: "agent52.firebaseapp.com",
  projectId: "agent52",
  storageBucket: "agent52.firebasestorage.app",
  messagingSenderId: "534394830199",
  appId: "1:534394830199:web:521b810d19dbcfe9edb572"
};

const firebase = new Firebase(firebaseConfig);

async function addHabit(){
  loading();

  const habit = document.getElementById("habitInput").value;
  if(!habit) return;

  await firebase.add("habits",{
    name: habit,
    timestamp: Date.now(),
    done: false
  });

  document.getElementById("habitInput").value="";
  await loadHabits();

  loading(false);
}

async function loadHabits(){
  loading();

  const list = document.getElementById("habitList");
  list.innerHTML="";

  const habits = await firebase.getAll("habits");

  habits.forEach(data=>{
    const li = document.createElement("li");

    const date = new Date(data.timestamp).toLocaleString();

    li.textContent = data.name + " - " + date;

    list.appendChild(li);
  });

  loading(false);
}

window.addHabit = addHabit;

loadHabits();

</script>

</body>
</html>
