<!DOCTYPE html>
<html>
<head>
<title>Habit Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-teal-50 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl p-6 w-[420px]">

<h2 class="text-2xl font-bold text-teal-700 mb-4">Habits</h2>

<h3 class="text-lg font-semibold text-gray-700">Your Habits</h3>

<ul id="habitList" class="mt-3 space-y-2"></ul>

</div>


<!-- FLOATING ADD BUTTON -->
<button onclick="openModal()"
class="fixed bottom-8 right-8 bg-teal-500 text-white w-14 h-14 rounded-full text-3xl flex items-center justify-center shadow-lg hover:bg-teal-600 transition">
+
</button>


<!-- ADD HABIT MODAL -->
<div id="modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center">

<div class="bg-white p-6 rounded-xl w-[350px] shadow-lg">

<h3 class="text-xl font-semibold text-teal-700 mb-4">Add Habit</h3>

<input id="habitInput"
placeholder="Enter habit"
class="w-full border rounded-lg px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-teal-400"
/>

<div class="flex justify-end gap-2">

<button onclick="closeModal()"
class="px-3 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">
Cancel
</button>

<button onclick="addHabit()"
class="px-3 py-2 bg-teal-500 text-white rounded-lg hover:bg-teal-600">
Add
</button>

</div>

</div>

</div>


<script src="bundle.min.js"></script>

<script type="module">
import { Firebase } from "./firebase.min.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0TxR5HpNJ8Ph7rnrHqXNMAmBWo1dw5Nw",
  authDomain: "agent52.firebaseapp.com",
  projectId: "agent52",
  storageBucket: "agent52.firebasestorage.app",
  messagingSenderId: "534394830199",
  appId: "1:534394830199:web:521b810d19dbcfe9edb572"
};

const firebase = new Firebase(firebaseConfig);

function openModal(){
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modal").classList.add("flex");
}

function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}

async function addHabit(){
  loading();
  const habit = document.getElementById("habitInput").value;
  if(!habit) return;

  await firebase.add("habits",{
    name: habit,
    timestamp: Date.now(),
    done: false
  });

  document.getElementById("habitInput").value="";
  closeModal();

  await loadHabits();
  loading(false);
}

async function loadHabits(){
  loading();
  const list = document.getElementById("habitList");
  list.innerHTML="";

  const habits = await firebase.getAll("habits");

  habits.forEach(data=>{

    const li = document.createElement("li");

    const date = new Date(data.timestamp).toLocaleString();

    li.className = "bg-white border border-teal-100 rounded-lg p-3 flex justify-between shadow-sm";

    li.innerHTML = `
      <span class="font-medium text-gray-800">${data.name}</span>
      <span class="text-sm text-gray-500">${date}</span>
    `;

    list.appendChild(li);
  });
  loading(false);
}

window.addHabit = addHabit;
window.openModal = openModal;
window.closeModal = closeModal;

loadHabits();

</script>

</body>
</html>
