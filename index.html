<!DOCTYPE HTML>
<html>
<head>

<script>

<style>
    body {
        background: black;
        color: #ddd;
    }
    .chart {
        display: block;
        height: 440px;
        margin: 10px;
    }
</style>
</head>
<body>
<div>
Mã CK : <input type="text" id="code" value="VNM"/>
</div>
<div class="chart" id="returnChart"></div>
<div class="chart" id="revenueChart"></div>
<div class="chart" id="revenueGrowthChart"></div>
<div class="chart" id="profitMarginChart"></div>
<div class="chart" id="expensesOnGrossProfitChart"></div>
<div class="chart" id="liabilitiesRatioChart"></div>
<div id="debug"></div>
<script>
window.onload = function () {
  $("#code").on("keypress", function(e) {
    if (e.which == 13) {
      alert("before");
      code = this.value;
      alert(code);
      getData();
      alert("after");
    }
  });
}
</script>
<script>
function charts() {
// 
generateChart(
  "returnChart", 
  "Return om equity", 
  prepareData([
    ["column", "green", "ROE"]
  ])
);
generateChart(
  "revenueChart", 
  "Revenue", 
  prepareData([
    ["column", "green", "Net revenue"],
    ["column", "red", "Profit after tax for shareholders of the parent company"],
  ])
);
generateChart(
  "revenueGrowthChart",
  "Net revenue growth",
  prepareData([
    ["column", "green", "Net revenue growth"]
  ])
);
generateChart(
  "profitMarginChart", 
  "Profit margin", 
  prepareData([
      ["column", "green", "Gross profit margin"],
    ["column", "red", "Net profit margin"]
  ])
);
generateChart(
  "expensesOnGrossProfitChart",
  "Expenses on gross profit",
  prepareData([
    ["column", "green", "Financial expenses on gross profit"],
    ["column", "blue", "Selling expenses on gross profit"],
    ["column", "red", "General and Administrative expenses on gross profit"],
  ])
); 
generateChart(
  "liabilitiesRatioChart",
  "Liabilities ratio",
  prepareData([
    ["column", "green", "Liabilities to assets"],
    ["column", "red", "Debt to equity"],
  ])
); 
}
</script>
