<!DOCTYPE html>
<html>
<head>
<title>Habit Tracker</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

<script type="module">
import * as btc from './scripts/btc.js';
import { sha256 } from './scripts/sha256lib.js';
import { ripemd160 } from './scripts/ripemd160lib.js';

const hexToBytes = h =>
  Uint8Array.from(h.match(/.{1,2}/g).map(b => parseInt(b, 16)));

const base58check = bytes => {
  const A = '123456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz';

  let x = BigInt('0x' + [...bytes].map(b => b.toString(16).padStart(2,'0')).join(''));
  let out = '';

  while (x > 0n) {
    out = A[x % 58n] + out;
    x /= 58n;
  }

  // 🔥 FIX: preserve leading zeros → '1'
  for (let i = 0; i < bytes.length && bytes[i] === 0; i++) {
    out = '1' + out;
  }

  return out;
};

async function privToAddress(hex) {
  const pub = btc.getPublicKey(hexToBytes(hex), true);
  console.log(sha256(pub));
  const h160 = ripemd160(sha256(pub));
  const payload = new Uint8Array([0x00, ...h160]);
  const checksum = sha256(sha256(payload)).slice(0, 4);
  return base58check(new Uint8Array([...payload, ...checksum]));
}

// test
privToAddress('0000000000000000000000000000000000000000000000B106681643F49295B5').then(console.log);
</script>

</head>

<body class="bg-teal-50 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl p-6 w-[420px]">

<h2 class="text-xl font-semibold text-teal-700 mb-4">Habits</h2>

<ul id="habitList" class="space-y-3"></ul>

</div>


<!-- FLOATING ADD BUTTON -->
<button onclick="openModal()"
class="fixed bottom-8 right-8 bg-teal-500 text-white w-14 h-14 rounded-full text-3xl flex items-center justify-center shadow-lg hover:bg-teal-600 transition">
+
</button>


<!-- ADD / EDIT MODAL -->
<div id="modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center">

<div class="bg-white p-6 rounded-xl w-[350px] shadow-lg">

<h3 id="modalTitle" class="text-xl font-semibold text-teal-700 mb-4">Add Habit</h3>

<input id="habitInput"
placeholder="Enter habit"
class="w-full border rounded-lg px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-teal-400"
/>

<div class="flex justify-end gap-2">

<button onclick="closeModal()"
class="px-3 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">
Cancel
</button>

<button onclick="saveHabit()"
class="px-3 py-2 bg-teal-500 text-white rounded-lg hover:bg-teal-600">
Save
</button>

</div>

</div>

</div>


<script src="/scripts/bundle.min.js"></script>

<script type="module">
import { Firebase } from "./scripts/firebase.min.js";
import { firebaseConfig } from "./scripts/config.js";

const firebase = new Firebase(firebaseConfig);

let editId=null;

function openModal(){
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modal").classList.add("flex");
}

function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}

function openEdit(habit){
  editId=habit.id;
  document.getElementById("modalTitle").textContent="Edit Habit";
  document.getElementById("habitInput").value=habit.name;
  openModal();
}

async function saveHabit(){

  loading();

  const habit=document.getElementById("habitInput").value;
  if(!habit) return;

  if(editId){
    await firebase.update("habits",editId,{name:habit});
    editId=null;
  }else{
    await firebase.add("habits",{
      name:habit,
      timestamp:Date.now(),
      done:false
    });
  }

  document.getElementById("habitInput").value="";
  document.getElementById("modalTitle").textContent="Add Habit";

  closeModal();
  await loadHabits();

  loading(false);
}

async function deleteHabit(id){
  await firebase.delete("habits",id);
  loadHabits();
}

async function loadHabits(){

  loading();

  const list=document.getElementById("habitList");
  list.innerHTML="";

  const habits=await firebase.getAll("habits");

  habits.forEach(data=>{

    const li=document.createElement("li");

    const date=new Date(data.timestamp).toLocaleDateString();

    li.className="bg-white border border-teal-100 rounded-xl p-4 flex justify-between items-center shadow-sm hover:shadow-md transition";

    li.innerHTML=`
      <div>
        <div class="font-medium text-gray-800">${data.name}</div>
        <div class="text-sm text-gray-400">${date}</div>
      </div>

      <div class="flex gap-2">

        <button class="p-2 rounded-lg hover:bg-teal-100 text-teal-600">
          <span class="material-symbols-outlined text-[20px]">edit</span>
        </button>

        <button class="p-2 rounded-lg hover:bg-red-100 text-red-500">
          <span class="material-symbols-outlined text-[20px]">delete</span>
        </button>

      </div>
    `;

    li.children[1].children[0].onclick=()=>openEdit(data);
    li.children[1].children[1].onclick=()=>deleteHabit(data.id);

    list.appendChild(li);
  });

  loading(false);
}

window.openModal=openModal;
window.closeModal=closeModal;
window.saveHabit=saveHabit;

loadHabits();

</script>

</body>
</html>
