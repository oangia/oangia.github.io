<html>
<head>
  <script src="https://oangia.github.io/utils.js"></script>
  
</head>
<body>
  <div id="filter"><div>
  <div id="debug"></div>
  <script>
    var api_url = "https://stocks803.000webhostapp.com/api/filter.php";
    $.ajax({
      url: api_url,
      method: "GET",
      success: function(data) {
        console.log(data);
        var html = "<table>";
        html += "<tr>";
        html += "<td>Mã ck</td>";
        html += "</tr>";
        $.each(data, function(index, value) {
          html += "<tr>";
          html += "<td>" + value.StockCode + "</td>";

          html += "</tr>";
        });
        html += "</table>";
        $("#filter").html(html);
      }
    });
  </script>
</body>
</html>
