<!DOCTYPE html>
<html>
<head>
<title>Firebase CRUD</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body class="bg-teal-50 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl p-6 w-[420px]">

<h2 class="text-xl font-semibold text-teal-700 mb-4">Firestore</h2>

<input id="collectionInput"
placeholder="Collection name"
class="w-full border rounded-lg px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-teal-400">

<ul id="docList" class="space-y-3"></ul>

</div>


<button onclick="openModal()"
class="fixed bottom-8 right-8 bg-teal-500 text-white w-14 h-14 rounded-full text-3xl flex items-center justify-center shadow-lg hover:bg-teal-600 transition">
+
</button>


<div id="modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center">

<div class="bg-white p-6 rounded-xl w-[350px] shadow-lg">

<h3 id="modalTitle" class="text-xl font-semibold text-teal-700 mb-4">Add Document</h3>

<input id="docInput"
placeholder='{"name":"test"}'
class="w-full border rounded-lg px-3 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-teal-400"
/>

<div class="flex justify-end gap-2">

<button onclick="closeModal()"
class="px-3 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">
Cancel
</button>

<button onclick="saveDoc()"
class="px-3 py-2 bg-teal-500 text-white rounded-lg hover:bg-teal-600">
Save
</button>

</div>

</div>

</div>


<script src="bundle.min.js"></script>

<script type="module">
import { Firebase } from "./firebase.min.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0TxR5HpNJ8Ph7rnrHqXNMAmBWo1dw5Nw",
  authDomain: "agent52.firebaseapp.com",
  projectId: "agent52",
  storageBucket: "agent52.firebasestorage.app",
  messagingSenderId: "534394830199",
  appId: "1:534394830199:web:521b810d19dbcfe9edb572"
};

const firebase = new Firebase(firebaseConfig);

let editId=null;

function collection(){
  return document.getElementById("collectionInput").value;
}

function openModal(){
  document.getElementById("modal").classList.remove("hidden");
  document.getElementById("modal").classList.add("flex");
}

function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}

function openEdit(doc){
  editId=doc.id;
  document.getElementById("modalTitle").textContent="Edit Document";
  document.getElementById("docInput").value=JSON.stringify(doc);
  openModal();
}

async function saveDoc(){

  loading();

  const col=collection();
  if(!col) return;

  let data;

  try{
    data=JSON.parse(document.getElementById("docInput").value);
  }catch{
    alert("invalid json");
    return;
  }

  if(editId){
    await firebase.update(col,editId,data);
    editId=null;
  }else{
    await firebase.add(col,data);
  }

  document.getElementById("docInput").value="";
  document.getElementById("modalTitle").textContent="Add Document";

  closeModal();
  await loadDocs();

  loading(false);
}

async function deleteDoc(id){
  await firebase.delete(collection(),id);
  loadDocs();
}

async function loadDocs(){

  loading();

  const list=document.getElementById("docList");
  list.innerHTML="";

  const docs=await firebase.getAll(collection());

  docs.forEach(data=>{

    const li=document.createElement("li");

    const date=data.timestamp
      ? new Date(data.timestamp).toLocaleDateString()
      : "";

    li.className="bg-white border border-teal-100 rounded-xl p-4 flex justify-between items-center shadow-sm hover:shadow-md transition";

    li.innerHTML=`
      <div>
        <div class="font-medium text-gray-800">${JSON.stringify(data)}</div>
        <div class="text-sm text-gray-400">${date}</div>
      </div>

      <div class="flex gap-2">

        <button class="p-2 rounded-lg hover:bg-teal-100 text-teal-600">
          <span class="material-symbols-outlined text-[20px]">edit</span>
        </button>

        <button class="p-2 rounded-lg hover:bg-red-100 text-red-500">
          <span class="material-symbols-outlined text-[20px]">delete</span>
        </button>

      </div>
    `;

    li.children[1].children[0].onclick=()=>openEdit(data);
    li.children[1].children[1].onclick=()=>deleteDoc(data.id);

    list.appendChild(li);
  });

  loading(false);
}

document.getElementById("collectionInput").addEventListener("change",loadDocs);

window.openModal=openModal;
window.closeModal=closeModal;
window.saveDoc=saveDoc;

</script>

</body>
</html>
