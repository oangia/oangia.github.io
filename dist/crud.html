<!DOCTYPE html>
<html>
<head>
<title>Firestore Tool</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

</head>

<body class="bg-teal-50 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl p-8 w-[900px]">

<div class="flex gap-3 mb-4">

<input
id="collectionInput"
placeholder="Collection name"
class="flex-1 border rounded-lg px-4 py-3 text-lg"
/>

<button
onclick="loadDocs()"
class="bg-teal-500 text-white px-6 rounded-lg hover:bg-teal-600">
Load
</button>

<button
onclick="openModal()"
class="bg-teal-600 text-white px-6 rounded-lg hover:bg-teal-700">
Add
</button>

</div>

<div class="flex gap-3 mb-4">

<input
id="search"
placeholder="Search"
class="flex-1 border rounded-lg px-4 py-3"
/>

<div id="docCount" class="text-gray-500 flex items-center px-3"></div>

</div>

<div class="h-[500px] overflow-y-auto border rounded-xl p-4 bg-gray-50">

<ul id="docList" class="space-y-4"></ul>

</div>

</div>



<div id="modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center">

<div class="bg-white p-6 rounded-xl w-[700px] shadow-lg">

<h3 id="modalTitle" class="text-xl font-semibold text-teal-700 mb-4">
Add Document
</h3>

<textarea
id="docInput"
placeholder='{"name":"test"}'
class="w-full border rounded-lg px-4 py-3 h-[300px] font-mono resize-y"
></textarea>

<div class="flex justify-between mt-4">

<div class="text-sm text-gray-400">
Ctrl + Enter to save
</div>

<div class="flex gap-2">

<button
onclick="closeModal()"
class="px-4 py-2 bg-gray-200 rounded-lg">
Cancel
</button>

<button
onclick="saveDoc()"
class="px-4 py-2 bg-teal-500 text-white rounded-lg">
Save
</button>

</div>

</div>

</div>

</div>



<script src="bundle.min.js"></script>

<script type="module">

import { Firebase } from "./firebase.min.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0TxR5HpNJ8Ph7rnrHqXNMAmBWo1dw5Nw",
  authDomain: "agent52.firebaseapp.com",
  projectId: "agent52",
  storageBucket: "agent52.firebasestorage.app",
  messagingSenderId: "534394830199",
  appId: "1:534394830199:web:521b810d19dbcfe9edb572"
};

const firebase = new Firebase(firebaseConfig);

let editId=null;



function collection(){
  return document.getElementById("collectionInput").value;
}



function openModal(){

  const m=document.getElementById("modal");

  m.classList.remove("hidden");
  m.classList.add("flex");
}



function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}



function openEdit(doc){

  editId=doc.id;

  const copy={...doc};
  delete copy.id;

  document.getElementById("modalTitle").textContent="Edit Document";

  document.getElementById("docInput").value=
    JSON.stringify(copy,null,2);

  openModal();
}



async function saveDoc(){

  const col=collection();
  if(!col) return;

  let data;

  try{
    data=JSON.parse(document.getElementById("docInput").value);
  }catch{
    alert("invalid json");
    return;
  }

  if(editId){

    await firebase.update(col,editId,data);
    editId=null;

  }else{

    await firebase.add(col,data);

  }

  document.getElementById("docInput").value="";
  document.getElementById("modalTitle").textContent="Add Document";

  closeModal();

  loadDocs();
}



async function deleteDoc(id){

  await firebase.delete(collection(),id);

  loadDocs();
}



async function duplicateDoc(doc){

  const copy={...doc};
  delete copy.id;

  await firebase.add(collection(),copy);

  loadDocs();
}



async function loadDocs(){

  const col=collection();
  if(!col) return;

  const list=document.getElementById("docList");
  list.innerHTML="";

  const docs=await firebase.getAll(col);

  const q=document.getElementById("search").value.toLowerCase();

  const filtered=docs.filter(d=>
    JSON.stringify(d).toLowerCase().includes(q)
  );

  document.getElementById("docCount").textContent=
    filtered.length+" documents";



  filtered.forEach(data=>{

    const li=document.createElement("li");

    li.className="bg-white border rounded-lg p-4";



    li.innerHTML=`

    <div class="flex justify-between items-center mb-2">

      <div class="font-medium text-gray-700">
        ${data.id}
      </div>

      <div class="flex gap-2">

        <button class="p-2 hover:bg-teal-100 rounded">
        <span class="material-symbols-outlined">edit</span>
        </button>

        <button class="p-2 hover:bg-yellow-100 rounded">
        <span class="material-symbols-outlined">content_copy</span>
        </button>

        <button class="p-2 hover:bg-red-100 rounded">
        <span class="material-symbols-outlined">delete</span>
        </button>

      </div>

    </div>

    <pre class="text-sm text-gray-600 whitespace-pre-wrap">${JSON.stringify(data,null,2)}</pre>

    `;

    const btns=li.querySelectorAll("button");

    btns[0].onclick=()=>openEdit(data);
    btns[1].onclick=()=>duplicateDoc(data);
    btns[2].onclick=()=>deleteDoc(data.id);

    list.appendChild(li);

  });

}



document
.getElementById("search")
.addEventListener("input",loadDocs);



document
.getElementById("docInput")
.addEventListener("keydown",(e)=>{

  if(e.ctrlKey && e.key==="Enter"){
    saveDoc();
  }

});



window.openModal=openModal;
window.closeModal=closeModal;
window.saveDoc=saveDoc;

</script>

</body>
</html>
