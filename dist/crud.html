<!DOCTYPE html>
<html>
<head>
<title>Firestore Tool</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>

</head>

<body class="bg-teal-50 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl p-8 w-[820px]">

<h2 class="text-2xl font-semibold text-teal-700 mb-6">
Firestore
</h2>

<input
id="collectionInput"
placeholder="Collection name"
class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-3 focus:outline-none focus:ring-2 focus:ring-teal-400"
/>

<input
id="search"
placeholder="Search documents"
class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-3 focus:outline-none focus:ring-2 focus:ring-teal-400"
/>

<div id="docCount" class="text-sm text-gray-400 mb-4"></div>

<div class="max-h-[520px] overflow-y-auto pr-1">
<ul id="docList" class="space-y-4"></ul>
</div>

</div>



<button onclick="openModal()"
class="fixed bottom-10 right-10 bg-teal-500 text-white w-16 h-16 rounded-full text-4xl flex items-center justify-center shadow-lg hover:bg-teal-600 transition">
+
</button>



<div id="modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center">

<div class="bg-white p-8 rounded-xl w-[600px] shadow-lg">

<h3 id="modalTitle" class="text-xl font-semibold text-teal-700 mb-5">
Add Document
</h3>

<textarea
id="docInput"
placeholder='{"name":"test"}'
class="w-full border border-gray-200 rounded-lg px-4 py-3 mb-5 h-60 font-mono text-sm focus:outline-none focus:ring-2 focus:ring-teal-400"
></textarea>

<div class="flex justify-end gap-3">

<button onclick="closeModal()"
class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300">
Cancel
</button>

<button onclick="saveDoc()"
class="px-4 py-2 bg-teal-500 text-white rounded-lg hover:bg-teal-600">
Save
</button>

</div>

</div>
</div>



<script src="bundle.min.js"></script>

<script type="module">

import { Firebase } from "./firebase.min.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0TxR5HpNJ8Ph7rnrHqXNMAmBWo1dw5Nw",
  authDomain: "agent52.firebaseapp.com",
  projectId: "agent52",
  storageBucket: "agent52.firebasestorage.app",
  messagingSenderId: "534394830199",
  appId: "1:534394830199:web:521b810d19dbcfe9edb572"
};

const firebase = new Firebase(firebaseConfig);

let editId=null;



function collection(){
  return document.getElementById("collectionInput").value;
}



function openModal(){
  const m=document.getElementById("modal");
  m.classList.remove("hidden");
  m.classList.add("flex");
}



function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}



function openEdit(doc){

  editId=doc.id;

  const copy={...doc};
  delete copy.id;

  document.getElementById("modalTitle").textContent="Edit Document";

  document.getElementById("docInput").value=
    JSON.stringify(copy,null,2);

  openModal();
}



async function saveDoc(){

  loading();

  const col=collection();
  if(!col) return;

  let data;

  try{
    data=JSON.parse(document.getElementById("docInput").value);
  }catch{
    alert("invalid json");
    return;
  }

  if(editId){

    await firebase.update(col,editId,data);
    editId=null;

  }else{

    await firebase.add(col,data);

  }

  document.getElementById("docInput").value="";
  document.getElementById("modalTitle").textContent="Add Document";

  closeModal();

  await loadDocs();

  loading(false);
}



async function deleteDoc(id){

  await firebase.delete(collection(),id);

  loadDocs();
}



async function duplicateDoc(doc){

  const copy={...doc};
  delete copy.id;

  await firebase.add(collection(),copy);

  loadDocs();
}



async function loadDocs(){

  loading();

  const col=collection();
  if(!col) return;

  const list=document.getElementById("docList");
  list.innerHTML="";

  const docs=await firebase.getAll(col);

  const q=document.getElementById("search").value.toLowerCase();

  const filtered=docs.filter(d=>
    JSON.stringify(d).toLowerCase().includes(q)
  );

  document.getElementById("docCount").textContent=
    filtered.length+" documents";



  filtered.forEach(data=>{

    const li=document.createElement("li");

    li.className="bg-white border border-teal-100 rounded-xl p-5 shadow-sm hover:shadow-md transition";

    const header=document.createElement("div");

    header.className="flex justify-between items-center cursor-pointer";



    const title=document.createElement("div");

    title.className="font-medium text-gray-800 text-sm";

    title.textContent=data.id;



    const buttons=document.createElement("div");

    buttons.className="flex gap-2";



    const editBtn=document.createElement("button");
    editBtn.className="p-2 rounded-lg hover:bg-teal-100 text-teal-600";
    editBtn.innerHTML=`<span class="material-symbols-outlined">edit</span>`;



    const dupBtn=document.createElement("button");
    dupBtn.className="p-2 rounded-lg hover:bg-yellow-100 text-yellow-600";
    dupBtn.innerHTML=`<span class="material-symbols-outlined">content_copy</span>`;



    const delBtn=document.createElement("button");
    delBtn.className="p-2 rounded-lg hover:bg-red-100 text-red-500";
    delBtn.innerHTML=`<span class="material-symbols-outlined">delete</span>`;



    buttons.append(editBtn,dupBtn,delBtn);

    header.append(title,buttons);



    const pre=document.createElement("pre");

    pre.className="text-sm text-gray-600 mt-4 hidden whitespace-pre-wrap bg-gray-50 p-3 rounded-lg";

    pre.textContent=JSON.stringify(data,null,2);



    header.onclick=()=>{
      pre.classList.toggle("hidden");
    };



    editBtn.onclick=(e)=>{
      e.stopPropagation();
      openEdit(data);
    };



    delBtn.onclick=(e)=>{
      e.stopPropagation();
      deleteDoc(data.id);
    };



    dupBtn.onclick=(e)=>{
      e.stopPropagation();
      duplicateDoc(data);
    };



    li.append(header,pre);

    list.appendChild(li);

  });

  loading(false);
}



document
  .getElementById("collectionInput")
  .addEventListener("input",loadDocs);



document
  .getElementById("search")
  .addEventListener("input",loadDocs);



window.openModal=openModal;
window.closeModal=closeModal;
window.saveDoc=saveDoc;

</script>

</body>
</html>
