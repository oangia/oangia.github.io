<!DOCTYPE html>
<html>
<head>
<title>Firebase CRUD</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-teal-50 min-h-screen flex items-center justify-center">

<div class="bg-white shadow-xl rounded-2xl p-6 w-[420px]">

<input id="collectionInput"
placeholder="Collection name"
class="w-full border rounded-lg px-3 py-2 mb-4">

<ul id="docList" class="space-y-2"></ul>

</div>


<button onclick="openModal()"
class="fixed bottom-8 right-8 bg-teal-500 text-white w-14 h-14 rounded-full text-3xl flex items-center justify-center shadow-lg hover:bg-teal-600 transition">
+
</button>


<div id="modal" class="fixed inset-0 bg-black/40 hidden items-center justify-center">

<div class="bg-white p-6 rounded-xl w-[350px] shadow-lg">

<h3 id="modalTitle" class="text-xl font-semibold text-teal-700 mb-4">Add Document</h3>

<textarea id="jsonInput"
placeholder='{"name":"test"}'
class="w-full border rounded-lg px-3 py-2 mb-4 h-28"></textarea>

<div class="flex justify-end gap-2">

<button onclick="closeModal()"
class="px-3 py-2 bg-gray-200 rounded-lg">
Cancel
</button>

<button onclick="saveDoc()"
class="px-3 py-2 bg-teal-500 text-white rounded-lg">
Save
</button>

</div>

</div>
</div>


<script type="module">
import { Firebase } from "./firebase.min.js";

const firebaseConfig = {
  apiKey: "AIzaSyB0TxR5HpNJ8Ph7rnrHqXNMAmBWo1dw5Nw",
  authDomain: "agent52.firebaseapp.com",
  projectId: "agent52",
  storageBucket: "agent52.firebasestorage.app",
  messagingSenderId: "534394830199",
  appId: "1:534394830199:web:521b810d19dbcfe9edb572"
};

const firebase = new Firebase(firebaseConfig);

let editId=null;

function collection(){
  return document.getElementById("collectionInput").value;
}

function openModal(){
  const m=document.getElementById("modal");
  m.classList.remove("hidden");
  m.classList.add("flex");
}

function closeModal(){
  document.getElementById("modal").classList.add("hidden");
}

function openEdit(doc){
  editId=doc.id;
  document.getElementById("modalTitle").textContent="Edit Document";
  document.getElementById("jsonInput").value=JSON.stringify(doc,null,2);
  openModal();
}

async function saveDoc(){

  const col=collection();
  if(!col) return;

  let data;

  try{
    data=JSON.parse(document.getElementById("jsonInput").value);
  }catch{
    alert("invalid json");
    return;
  }

  if(editId){
    await firebase.update(col,editId,data);
    editId=null;
  }else{
    await firebase.add(col,data);
  }

  document.getElementById("jsonInput").value="";
  document.getElementById("modalTitle").textContent="Add Document";
  closeModal();

  loadDocs();
}

async function deleteDoc(id){
  await firebase.delete(collection(),id);
  loadDocs();
}

async function loadDocs(){

  const col=collection();
  if(!col) return;

  const list=document.getElementById("docList");
  list.innerHTML="";

  const docs=await firebase.getAll(col);

  docs.forEach(doc=>{

    const li=document.createElement("li");

    li.className="bg-white border border-teal-100 rounded-lg p-3 flex justify-between items-center shadow-sm";

    li.innerHTML=`
      <span class="text-sm">${JSON.stringify(doc)}</span>

      <div class="flex gap-2">
        <button class="bg-blue-500 text-white px-2 py-1 rounded text-sm">Edit</button>
        <button class="bg-red-500 text-white px-2 py-1 rounded text-sm">Delete</button>
      </div>
    `;

    li.children[1].children[0].onclick=()=>openEdit(doc);
    li.children[1].children[1].onclick=()=>deleteDoc(doc.id);

    list.appendChild(li);

  });

}

document.getElementById("collectionInput").addEventListener("change",loadDocs);

window.openModal=openModal;
window.closeModal=closeModal;
window.saveDoc=saveDoc;

</script>

</body>
</html>
